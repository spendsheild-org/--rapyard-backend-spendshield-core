import { Hono } from 'hono'

const health = new Hono()

health.get('/health', c => c.json({ ok: true, service: 'spendshield-core' }))

export default health
import app from '../dist/app.js'

export default async function handler(req, res) {
  const url = new URL(req.url, `http://${req.headers.host}`)

  const honoReq = new Request(url.toString(), {
    method: req.method,
    headers: req.headers,
    body: ['GET', 'HEAD'].includes(req.method) ? undefined : req
  })

  const honoRes = await app.fetch(honoReq)

  res.statusCode = honoRes.status
  honoRes.headers.forEach((v, k) => res.setHeader(k, v))

  const buf = Buffer.from(await honoRes.arrayBuffer())
  res.end(buf)
}
import fs from 'fs'
import path from 'path'

const root = process.cwd()
const out = path.join(root, '.vercel/output')

// Clean old output
fs.rmSync(out, { recursive: true, force: true })

// Recreate structure
fs.mkdirSync(path.join(out, 'functions/api/index.func'), { recursive: true })
fs.mkdirSync(path.join(out, 'static'), { recursive: true })

// Write config.json
fs.writeFileSync(
  path.join(out, 'config.json'),
  JSON.stringify(
    {
      version: 3,
      routes: [
        { src: "/api/(.*)", dest: "functions/api/index.func" },
        { src: "/(.*)", dest: "/static/$1" }
      ]
    },
    null,
    2
  )
)

// Write .vc-config.json
fs.writeFileSync(
  path.join(out, 'functions/api/index.func/.vc-config.json'),
  JSON.stringify(
    {
      runtime: "nodejs20.x",
      handler: "index.js",
      launcherType: "Nodejs",
      regions: ["iad1"]
    },
    null,
    2
  )
)

// Copy adapter
fs.copyFileSync(
  path.join(root, 'scripts/vercel-hono-adapter.js'),
  path.join(out, 'functions/api/index.func/index.js')
)

console.log("✔ Built .vercel/output for Vercel prebuilt deploy")
