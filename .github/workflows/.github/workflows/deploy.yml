# SpendShield Core Backend

Hono-based backend for SpendShield, deployed via Vercel using a CI‑first,
prebuilt-output workflow.

## Commands

- `npm run dev` — local development
- `npm run build` — compile TypeScript + generate `.vercel/output`
- CI deploys automatically on push to `main`

## Architecture

- Hono for routing
- Node runtime on Vercel
- Deterministic `.vercel/output` bundle
- Zero Vercel drift


